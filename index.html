<style>
    :root {
        --bg: #030712;
        --card-bg: rgba(15, 23, 42, 0.3);
        --text: #f8fafc;
        --text-dim: #94a3b8;
        --accent: #38bdf8;
        --accent-glow: rgba(56, 189, 248, 0.15);
        --border: rgba(255, 255, 255, 0.05);
    }

    * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

    body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg);
        background: radial-gradient(circle at 50% -20%, #1e293b 0%, transparent 50%),
                    radial-gradient(circle at 0% 100%, #0c4a6e 0%, transparent 30%),
                    #030712;
        color: var(--text);
        margin: 0;
        line-height: 1.5;
        overflow-x: hidden;
    }

    nav {
        position: fixed;
        top: 0;
        width: 100%;
        padding: 20px;
        backdrop-filter: blur(10px);
        background: rgba(3, 7, 18, 0.8);
        border-bottom: 1px solid var(--border);
        z-index: 1000;
        display: flex;
        justify-content: center;
        gap: 30px;
    }

    nav a {
        text-decoration: none;
        color: var(--text-dim);
        font-family: 'Fira Code', monospace;
        font-size: 0.9rem;
    }

    nav a:hover, nav a.active {
        color: var(--accent);
        text-shadow: 0 0 10px var(--accent-glow);
    }

    .container {
        width: 90%;
        max-width: 1000px;
        margin: 0 auto;
        padding: 120px 20px;
    }

    .profile-img {
        width: 140px;
        height: 140px;
        border-radius: 24px;
        border: 1px solid var(--border);
        box-shadow: 0 0 40px rgba(56, 189, 248, 0.1);
    }

    .profile-img:hover {
        transform: rotate(5deg) scale(1.05);
        border-color: var(--accent);
    }

    .card {
        background: var(--card-bg);
        backdrop-filter: blur(16px);
        padding: 30px;
        border-radius: 24px;
        border: 1px solid var(--border);
        position: relative;
    }

    .card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 24px;
        padding: 1px;
        background: linear-gradient(45deg, var(--accent), transparent, var(--accent));
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        opacity: 0;
        transition: 0.5s;
    }

    .card:hover::before { opacity: 0.5; }

    .card:hover {
        background: rgba(15, 23, 42, 0.8);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .tech-pill {
        background: rgba(56, 189, 248, 0.05);
        color: var(--accent);
        border: 1px solid rgba(56, 189, 248, 0.1);
        padding: 4px 12px;
        border-radius: 100px;
    }

    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .reveal { animation: fadeInUp 0.8s ease forwards; }

</style>

<nav>
    <a href="#home" class="active">/home</a>
    <a href="#projects">/projects</a>
    <a href="#about">/about</a>
    <a href="https://github.com/mourntheloss">/github</a>
</nav>

<div class="container">
    <header class="reveal">
        <img src="https://github.com/mourntheloss.png" alt="mourntheloss" class="profile-img">
        <div class="header-content">
            <h1>mourntheloss</h1>
            <p class="bio">>c++, asm, java</p>
        </div>
    </header>

    </div>
